services:
  - type: web
    name: expensemania-backend
    env: docker
    rootDir: expensemania-backend
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /api/v1/health
    autoDeploy: true
    envVars:
      - key: APP_ENV
        value: production
      - key: PORT
        value: 8080
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DB
        value: expensemania
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: ACCESS_TOKEN_TTL
        value: 15m
      - key: REFRESH_TOKEN_TTL
        value: 720h
      - key: FRONTEND_URL
        sync: false
      - key: COOKIE_SECURE
        value: "true"
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: RATE_LIMIT_MAX
        value: "120"
      - key: RATE_LIMIT_WINDOW
        value: 1m
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USERNAME
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_FROM
        sync: false
      - key: REDIS_URL
        sync: false
      - key: DEFAULT_CURRENCY
        value: INR
      - key: DEFAULT_TIMEZONE
        value: Asia/Kolkata
