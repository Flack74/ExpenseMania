<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ExpenseMania — Premium Expense Tracking</title>
    <meta name="description" content="ExpenseMania is a premium expense tracking dashboard for budgets, spending analytics, and monthly financial clarity." />
    <meta name="author" content="ExpenseMania" />
    <meta name="theme-color" content="#FAF3E1" />

    <meta property="og:title" content="ExpenseMania — Premium Expense Tracking" />
    <meta property="og:description" content="Track expenses, budgets, and spending trends with a polished fintech dashboard." />
    <meta property="og:type" content="website" />

    <meta name="twitter:card" content="summary_large_image" />
  </head>

  <body>
    <script>
      (function () {
        try {
          var stored = localStorage.getItem("expensemania-theme") || "system";
          var prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
          var resolved = stored === "system" ? (prefersDark ? "dark" : "light") : stored;
          document.documentElement.classList.toggle("dark", resolved === "dark");
          document.documentElement.dataset.theme = resolved;
          document.documentElement.style.colorScheme = resolved;
        } catch (_) {}
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
