name: Render Keep Alive

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Ping backend health endpoint
        env:
          RENDER_BACKEND_URL: ${{ secrets.RENDER_BACKEND_URL || vars.RENDER_BACKEND_URL }}
        run: |
          if [ -z "$RENDER_BACKEND_URL" ]; then
            echo "Set RENDER_BACKEND_URL as a repository variable or secret."
            exit 1
          fi
          BASE_URL="${RENDER_BACKEND_URL%/}"
          curl --fail --silent --show-error --max-time 20 "$BASE_URL/health"
